site_name: SWAT+ Documentation
site_description: SWAT+ I/O Documentation — Input and Output Files

# ── Repository ────────────────────────────────────────────────────────────────
# Update repo_url once you have created your GitHub repository.
# The edit_uri must match your default branch name (main or master).
# Until then, remove or comment out these three lines to hide the buttons.
repo_url: https://github.com/TUM-HFM/swatplus-docs
repo_name: swatplus-docs
edit_uri: edit/main/docs/

# ── Theme ─────────────────────────────────────────────────────────────────────
theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.action.view
    - content.code.copy

# ── Markdown extensions ───────────────────────────────────────────────────────
markdown_extensions:
  - tables
  - admonition
  - attr_list
  - def_list
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

# ── Plugins ───────────────────────────────────────────────────────────────────
plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true   # works without git, shows real dates once committed

# ── Navigation ────────────────────────────────────────────────────────────────
